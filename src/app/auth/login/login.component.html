<div class="erp-auth-page">
  <div class="erp-auth-page__shell">
    <div class="erp-auth erp-auth--card erp-auth--login-ui">
      <header class="erp-auth-login__header">
        <div class="erp-auth-login__brand">
          <i class="bi bi-lock-fill erp-auth-login__brand-icon" aria-hidden="true"></i>
          <div class="erp-auth-login__brand-text">
            <span class="erp-auth-login__brand-name">{{ appName }}</span>
            <span class="erp-auth-login__brand-tag">{{ appTagline }}</span>
          </div>
        </div>
      </header>

      <main class="erp-auth-login__main">
        <h1 class="erp-auth-login__title">{{ ui.cardTitle }}</h1>
        <p class="erp-auth-login__subtitle">{{ ui.signInLead }}</p>

        <form class="erp-auth__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
          <div class="erp-field erp-auth-login__field">
            <label class="erp-field__label erp-auth-login__sr-only" for="login-email">{{ ui.emailLabel }}</label>
            <div class="erp-input-wrap">
              <span class="erp-input-wrap__icon erp-input-wrap__icon--start" aria-hidden="true">
                <i class="bi bi-envelope"></i>
              </span>
              <input
                id="login-email"
                type="email"
                class="erp-input erp-input--auth-leading"
                [class.erp-input--error]="submitted && form.controls.email.invalid"
                formControlName="email"
                [attr.placeholder]="ui.emailPlaceholder"
                autocomplete="email"
              />
            </div>
            <div class="erp-field__error" *ngIf="submitted && form.controls.email.errors?.['required']">Email is required.</div>
            <div class="erp-field__error" *ngIf="submitted && form.controls.email.errors?.['email']">Enter a valid email.</div>
          </div>

          <div class="erp-field erp-auth-login__field">
            <label class="erp-field__label erp-auth-login__sr-only" for="login-password">{{ ui.passwordLabel }}</label>
            <div class="erp-input-wrap erp-input-wrap--password erp-input-wrap--login-password">
              <span class="erp-auth-login__password-lead-icon" aria-hidden="true">
                <i class="bi bi-lock"></i>
              </span>
              <input
                id="login-password"
                [type]="showPassword ? 'text' : 'password'"
                class="erp-input erp-input--with-reveal"
                [class.erp-input--error]="submitted && form.controls.password.invalid"
                formControlName="password"
                [attr.placeholder]="ui.passwordPlaceholder"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="erp-password-reveal"
                (click)="showPassword = !showPassword"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                [attr.aria-pressed]="showPassword"
              >
                <i *ngIf="!showPassword" class="bi bi-eye" aria-hidden="true"></i>
                <i *ngIf="showPassword" class="bi bi-eye-slash" aria-hidden="true"></i>
              </button>
            </div>
            <div class="erp-field__error" *ngIf="submitted && form.controls.password.errors?.['required']">Password is required.</div>
          </div>

          <div class="erp-auth-login__alert" *ngIf="apiError" role="alert">{{ apiError }}</div>

          <button type="submit" class="erp-btn erp-btn--primary erp-btn--block erp-auth-login__submit" [disabled]="loading">
            {{ loading ? ui.submitting : ui.submit }}
          </button>
        </form>

        <p class="erp-auth-login__footer">
          {{ ui.footerLead }}
          <a routerLink="/auth/register">{{ ui.footerLink }}</a>
        </p>
      </main>
    </div>
  </div>
</div>
