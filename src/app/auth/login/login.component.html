<div class="erp-auth-page">
  <div class="erp-auth-page__shell">
    <div class="erp-auth erp-auth--card">
      <div class="erp-auth__header-center">
        <div class="erp-auth__icon-box" aria-hidden="true">
          <svg class="erp-auth__icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="11" width="14" height="10" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" />
          </svg>
        </div>
        <h1 class="erp-auth__title erp-auth__title--center">{{ ui.cardTitle }}</h1>
        <p class="erp-auth__subtitle erp-auth__subtitle--center">
          <strong>{{ appName }}</strong> · {{ appTagline }}
        </p>
        <p class="erp-auth__lede erp-auth__lede--center">{{ ui.signInLead }}</p>
      </div>

      <form class="erp-auth__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="erp-field">
          <label class="erp-field__label" for="login-email">{{ ui.emailLabel }}</label>
          <div class="erp-input-wrap">
            <input
              id="login-email"
              type="email"
              class="erp-input erp-input--inset"
              [class.erp-input--error]="submitted && form.controls.email.invalid"
              formControlName="email"
              [attr.placeholder]="ui.emailPlaceholder"
              autocomplete="email"
            />
            <span class="erp-input-wrap__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <path d="m22 6-10 7L2 6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
          </div>
          <div class="erp-field__error" *ngIf="submitted && form.controls.email.errors?.['required']">Email is required.</div>
          <div class="erp-field__error" *ngIf="submitted && form.controls.email.errors?.['email']">Enter a valid email.</div>
        </div>

        <div class="erp-field">
          <label class="erp-field__label" for="login-password">{{ ui.passwordLabel }}</label>
          <div class="erp-input-wrap erp-input-wrap--password">
            <input
              id="login-password"
              [type]="showPassword ? 'text' : 'password'"
              class="erp-input erp-input--with-reveal"
              [class.erp-input--error]="submitted && form.controls.password.invalid"
              formControlName="password"
              [attr.placeholder]="ui.passwordPlaceholder"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="erp-password-reveal"
              (click)="showPassword = !showPassword"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showPassword"
            >
              <svg
                *ngIf="!showPassword"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg
                *ngIf="showPassword"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round" />
              </svg>
            </button>
          </div>
          <div class="erp-field__error" *ngIf="submitted && form.controls.password.errors?.['required']">Password is required.</div>
        </div>

        <div class="erp-auth__row">
          <a routerLink="/auth/forgot-password" class="erp-link--muted">{{ ui.forgotLink }}</a>
        </div>

        <div class="erp-field__error" *ngIf="apiError" role="alert">{{ apiError }}</div>

        <button type="submit" class="erp-btn erp-btn--primary erp-btn--block" [disabled]="loading">
          {{ loading ? ui.submitting : ui.submit }}
        </button>
      </form>

      <p class="erp-auth__footer erp-auth__footer--tight">
        {{ ui.footerLead }}
        <a routerLink="/auth/register">{{ ui.footerLink }}</a>
      </p>

      <p class="erp-auth__legal">{{ ui.footerLegal }}</p>
    </div>
  </div>
</div>
