# Google Cloud Build → Angular production build → App Engine
# Trigger: connect repo in Cloud Build, set this file as config, use same root as this file.
#
# Required: enable Cloud Build API, App Engine API; grant Cloud Build SA
# roles for App Engine deploy (e.g. App Engine Admin, Service Account User).

steps:
  # Fresh deps every build: remove lock so git deps (e.g. bot-lib#branch) resolve to latest commit;
  # then clean install from package.json only. (Builds are less reproducible than a committed lockfile.)
  - name: 'node:18'
    id: 'install'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'rm -rf node_modules package-lock.json && npm cache clean --force && npm install'

  - name: 'node:18'
    id: 'build'
    entrypoint: 'npx'
    args: ['ng', 'build', '--configuration', 'production']
    waitFor: ['install']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args: ['app', 'deploy', 'app.yaml', '--quiet']
    waitFor: ['build']

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
